<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Advance Happy Birthday Suji ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#1a0033,#3d0066,#70004d);
    color:white;
    text-align:center;
}

/* Floating Hearts */
.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.hearts span{
    position:absolute;
    display:block;
    color:#ff4da6;
    font-size:20px;
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    100%{
        transform:translateY(-100px);
        opacity:1;
    }
}

.container{
    position:relative;
    z-index:10;
    max-width:1100px;
}

h1{
    font-size:5rem;
    color:#ff66cc;
    text-shadow:0 0 20px #ff66cc;
}

.subtitle{
    margin-top:10px;
    font-size:1.4rem;
    color:#ffd6f5;
}

.countdown{
    margin-top:50px;
    display:flex;
    gap:25px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    width:220px;
    height:260px;
    border:2px solid #ff4da6;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,77,166,0.8);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.box h2{
    font-size:5rem;
}

.box p{
    font-size:1.3rem;
    letter-spacing:2px;
}

.footer{
    margin-top:40px;
    font-size:1.5rem;
    color:#ffcce6;
}

.message{
    display:none;
    font-size:4rem;
    color:#ff66cc;
    text-shadow:0 0 30px #ff66cc;
    animation:glow 1s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #ff66cc;
    }
    to{
        text-shadow:0 0 40px #ff66cc;
    }
}

@media(max-width:768px){
    h1{
        font-size:3rem;
    }

    .box{
        width:150px;
        height:180px;
    }

    .box h2{
        font-size:3rem;
    }
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">

    <h1>Happy Birthday Suji ❤️</h1>
    <div class="subtitle">Counting down to your special day ✨</div>

    <div class="countdown" id="countdown">

        <div class="box">
            <h2 id="days">0</h2>
            <p>DAYS</p>
        </div>

        <div class="box">
            <h2 id="hours">0</h2>
            <p>HOURS</p>
        </div>

        <div class="box">
            <h2 id="minutes">0</h2>
            <p>MINUTES</p>
        </div>

        <div class="box">
            <h2 id="seconds">0</h2>
            <p>SECONDS</p>
        </div>

    </div>

    <div class="footer">
        You make every moment beautiful 💖
    </div>

    <div class="message" id="birthdayMessage">
        🎉 Happy Birthday Suji 🎂❤️
    </div>

</div>

<script>

// Change Year if needed
const birthday = new Date("July 18, 2026 00:00:00").getTime();

const countdown = setInterval(()=>{

    const now = new Date().getTime();
    const distance = birthday - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
    const seconds = Math.floor((distance%(1000*60))/1000);

    document.getElementById("days").innerHTML=days;
    document.getElementById("hours").innerHTML=hours;
    document.getElementById("minutes").innerHTML=minutes;
    document.getElementById("seconds").innerHTML=seconds;

    if(distance < 0){
        clearInterval(countdown);
        document.getElementById("countdown").style.display="none";
        document.querySelector(".footer").style.display="none";
        document.getElementById("birthdayMessage").style.display="block";
    }

},1000);


// Floating Hearts
const hearts=document.getElementById("hearts");

for(let i=0;i<50;i++){
    let heart=document.createElement("span");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"%";
    heart.style.animationDuration=(Math.random()*5+5)+"s";
    heart.style.fontSize=(Math.random()*25+15)+"px";
    hearts.appendChild(heart);
}
</script>

</body>
</html>
